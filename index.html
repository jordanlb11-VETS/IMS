/* ---------------------------------------------------------------
   CRITICAL PATH METHOD
--------------------------------------------------------------- */
function computeCPM(tasks) {
  const map = {};
  tasks.forEach((t) => (map[t.id] = t));
  const es = {}, ef = {}, visitingF = new Set();

  function getEF(id) {
    if (ef[id] !== undefined) return ef[id];
    if (visitingF.has(id)) return 0; // guard against accidental cycles
    visitingF.add(id);
    const t = map[id];
    const deps = (t.dependsOn || []).filter((d) => map[d]);
    const start = deps.length ? Math.max(...deps.map((d) => getEF(d))) : 0;
    es[id] = start;
    ef[id] = start + Math.max(1, t.durationDays || 1);
    visitingF.delete(id);
    return ef[id];
  }
  tasks.forEach((t) => getEF(t.id));
  const projectEnd = tasks.length ? Math.max(...tasks.map((t) => ef[t.id])) : 0;

  const successors = {};
  tasks.forEach((t) => (successors[t.id] = []));
  tasks.forEach((t) => (t.dependsOn || []).forEach((d) => { if (successors[d]) successors[d].push(t.id); }));

  const lf = {}, ls = {}, visitingB = new Set();
  function getLF(id) {
    if (lf[id] !== undefined) return lf[id];
    if (visitingB.has(id)) return projectEnd;
    visitingB.add(id);
    const succs = successors[id];
    const val = succs.length ? Math.min(...succs.map((s) => getLS(s))) : projectEnd;
    lf[id] = val;
    visitingB.delete(id);
    return val;
  }
  function getLS(id) {
    if (ls[id] !== undefined) return ls[id];
    const t = map[id];
    const val = getLF(id) - Math.max(1, t.durationDays || 1);
    ls[id] = val;
    return val;
  }
  tasks.forEach((t) => { getLF(t.id); getLS(t.id); });

  const result = {};
  tasks.forEach((t) => {
    const slack = ls[t.id] - es[t.id];
    result[t.id] = { es: es[t.id], ef: ef[t.id], ls: ls[t.id], lf: lf[t.id], slack, critical: slack <= 0 };
  });
  return { cpm: result, projectEnd };
}

   MAIN APP
--------------------------------------------------------------- */
const STORAGE_KEY = "ops-command-planner-data-v1";
const NAME_KEY = "ops-command-my-name";

function timeAgo(iso) {
  if (!iso) return "";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return fmtDate(iso.slice(0, 10));
}

function loadSavedData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.team && parsed.programs && parsed.tasks && parsed.customers) return parsed;
    }
  } catch (e) { console.error("Could not read saved Ops Command data", e); }
  return null;
}

function OpsCommand() {
  const initialRef = useRef(null);
  if (initialRef.current === null) {
    initialRef.current = loadSavedData() || { team: seedTeam, programs: seedPrograms, tasks: seedTasks, customers: seedCustomers };
  }
  const initial = initialRef.current;

  const [view, setView] = useState("dashboard");
  const [team, setTeam] = useState(initial.team);
  const [programs, setPrograms] = useState(initial.programs);
  const [tasks, setTasks] = useState(initial.tasks);
  const [customers, setCustomers] = useState(initial.customers);

  const [loaded] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(false);
  const [lastSynced, setLastSynced] = useState(null);
  const saveTimerRef = useRef(null);
  const fileInputRef = useRef(null);

  const [currentUser, setCurrentUser] = useState(null);
  const [nameLoaded, setNameLoaded] = useState(false);
  const [showNamePrompt, setShowNamePrompt] = useState(false);

  // modal state: { type: 'task'|'program'|'customer'|'team', mode:'add'|'edit', data }
  const [modal, setModal] = useState(null);
  const modalRef = useRef(modal);
  useEffect(() => { modalRef.current = modal; }, [modal]);

  // load "who am I" — stored in this browser only
  useEffect(() => {
    try {
      const saved = localStorage.getItem(NAME_KEY);
      if (saved) setCurrentUser(saved);
      else setShowNamePrompt(true);
    } catch (e) {
      setShowNamePrompt(true);
    }
    setNameLoaded(true);
  }, []);

  const saveMyName = (name) => {
    const trimmed = (name || "").trim() || "Someone";
    setCurrentUser(trimmed);
    setShowNamePrompt(false);
    try { localStorage.setItem(NAME_KEY, trimmed); } catch (e) { /* ignore */ }
  };

  const stamp = (obj) => ({ ...obj, editedBy: currentUser || "Someone", editedAt: new Date().toISOString() });

  // auto-save to this browser's local storage whenever data changes
  useEffect(() => {
    try {
      setSyncing(true);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ team, programs, tasks, customers }));
      setSyncError(false);
      setLastSynced(new Date());
      clearTimeout(saveTimerRef.current);
      saveTimerRef.current = setTimeout(() => setSyncing(false), 400);
    } catch (e) {
      setSyncError(true);
      setSyncing(false);
    }
  }, [team, programs, tasks, customers]);

  const pullLatest = () => {
    const data = loadSavedData();
    if (data) {
      setTeam(data.team || []);
      setPrograms(data.programs || []);
      setTasks(data.tasks || []);
      setCustomers(data.customers || []);
    }
    setLastSynced(new Date());
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify({ team, programs, tasks, customers }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ops-command-backup-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!window.confirm("Import will replace everything currently in the planner. Continue?")) return;
        setTeam(parsed.team || []);
        setPrograms(parsed.programs || []);
        setTasks(parsed.tasks || []);
        setCustomers(parsed.customers || []);
      } catch (err) {
        window.alert("That file couldn't be read. Make sure it's an Ops Command backup (.json).");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const resetToSample = () => {
    if (!window.confirm("Reset to the sample data? Everything you've entered will be erased.")) return;
    setTeam(seedTeam);
    setPrograms(seedPrograms);
    setTasks(seedTasks);
    setCustomers(seedCustomers);
  };

  const teamById = useMemo(() => Object.fromEntries(team.map((m) => [m.id, m])), [team]);
  const programById = useMemo(() => Object.fromEntries(programs.map((p) => [p.id, p])), [programs]);
  const customerById = useMemo(() => Object.fromEntries(customers.map((c) => [c.id, c])), [customers]);

  /* ---------- mutators ---------- */
  const saveTask = (data) => {
    const stamped = stamp(data);
    setTasks((prev) => {
      const exists = prev.some((t) => t.id === stamped.id);
      return exists ? prev.map((t) => (t.id === stamped.id ? stamped : t)) : [...prev, stamped];
    });
    setModal(null);
  };
  const deleteTask = (id) => setTasks((prev) => prev.filter((t) => t.id !== id));

  const saveProgram = (data) => {
    const stamped = stamp(data);
    setPrograms((prev) => {
      const exists = prev.some((p) => p.id === stamped.id);
      return exists ? prev.map((p) => (p.id === stamped.id ? stamped : p)) : [...prev, stamped];
    });
    setModal(null);
  };
  const deleteProgram = (id) => {
    setPrograms((prev) => prev.filter((p) => p.id !== id));
    setTasks((prev) => prev.map((t) => (t.programId === id ? { ...t, programId: null } : t)));
  };

  const saveCustomer = (data) => {
    const stamped = stamp(data);
    setCustomers((prev) => {
      const exists = prev.some((c) => c.id === stamped.id);
      return exists ? prev.map((c) => (c.id === stamped.id ? stamped : c)) : [...prev, stamped];
    });
    setModal(null);
  };
  const deleteCustomer = (id) => setCustomers((prev) => prev.filter((c) => c.id !== id));

  const saveTeamMember = (data) => {
    setTeam((prev) => {
      const exists = prev.some((m) => m.id === data.id);
      return exists ? prev.map((m) => (m.id === data.id ? data : m)) : [...prev, data];
    });
    setModal(null);
  };
  const deleteTeamMember = (id) => {
    setTeam((prev) => prev.filter((m) => m.id !== id));
    setTasks((prev) => prev.map((t) => (t.assigneeId === id ? { ...t, assigneeId: null } : t)));
  };

  const toggleTaskDone = (id) => {
    setTasks((prev) => prev.map((t) => t.id === id ? stamp({ ...t, status: t.status === "Done" ? "Not Started" : "Done" }) : t));
  };

  const toggleMilestone = (programId, msId) => {
    setPrograms((prev) => prev.map((p) => p.id !== programId ? p : stamp({
      ...p, milestones: p.milestones.map((m) => m.id === msId ? { ...m, done: !m.done } : m),
    })));
  };

  const NAV = [
    { key: "dashboard", label: "Dashboard", icon: "grid" },
    { key: "tasks", label: "Tasks", icon: "check" },
    { key: "programs", label: "Programs", icon: "folder" },
    { key: "customers", label: "Customers", icon: "users" },
    { key: "calendar", label: "Calendar", icon: "calendar" },
    { key: "gantt", label: "Gantt", icon: "chart" },
    { key: "team", label: "Team", icon: "usercog" },
  ];

  if (!loaded) {
    return (
      <div className="app-shell">
        <style>{CSS}</style>
        <div className="loading-screen">
          <div className="brand-mark">OC</div>
          <div>Loading shared planner…</div>
        </div>
      </div>
    );
  }

  return (
    <div className="app-shell">
      <style>{CSS}</style>

      <aside className="sidebar">
        <div className="brand">
          <div className="brand-mark">OC</div>
          <div className="brand-text">
            <div className="brand-title">Ops Command</div>
            <div className="brand-sub">Programs &amp; Operations</div>
          </div>
        </div>
        <nav className="nav">
          {NAV.map((n) => (
            <button
              key={n.key}
              className={`nav-item ${view === n.key ? "active" : ""}`}
              onClick={() => setView(n.key)}
              type="button"
            >
              <Icon name={n.icon} size={17} />
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="status-line">
            You: <strong style={{ color: "var(--text)" }}>{currentUser || "…"}</strong>
            <button type="button" className="link-btn" onClick={() => setShowNamePrompt(true)}>change</button>
          </div>
          <div className="status-line">
            <span className={`sync-dot ${syncError ? "err" : syncing ? "busy" : "ok"}`} />
            {syncError ? "Save failed" : syncing ? "Saving…" : "Saved on this device"}
          </div>
          <div className="status-line dim-text">
            {lastSynced ? `Last saved ${lastSynced.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}` : ""}
          </div>
          <button type="button" className="footer-btn" onClick={pullLatest}>Refresh from this browser</button>
          <div className="status-line" style={{ marginTop: 8 }}><Icon name="dot" size={12} color="var(--green)" /> {programs.filter(p=>p.status==="On Track").length} on track</div>
          <div className="status-line"><Icon name="dot" size={12} color="var(--red)" /> {programs.filter(p=>p.status==="Off Track").length} off track</div>
          <div className="data-actions">
            <button type="button" className="footer-btn" onClick={exportData}>Export backup</button>
            <button type="button" className="footer-btn" onClick={() => fileInputRef.current && fileInputRef.current.click()}>Import backup</button>
            <input ref={fileInputRef} type="file" accept="application/json" style={{ display: "none" }} onChange={importData} />
            <button type="button" className="footer-btn danger" onClick={resetToSample}>Reset sample data</button>
          </div>
        </div>
      </aside>

      <main className="main">
        {view === "dashboard" && (
          <Dashboard
            tasks={tasks} programs={programs} customers={customers} team={team}
            teamById={teamById} programById={programById}
            onToggleTask={toggleTaskDone}
            onGo={setView}
          />
        )}
        {view === "tasks" && (
          <TasksView
            tasks={tasks} programs={programs} customers={customers} team={team}
            teamById={teamById} programById={programById} customerById={customerById}
            onAdd={() => setModal({ type: "task", mode: "add" })}
            onEdit={(t) => setModal({ type: "task", mode: "edit", data: t })}
            onDelete={deleteTask}
            onToggleDone={toggleTaskDone}
          />
        )}
        {view === "programs" && (
          <ProgramsView
            programs={programs} tasks={tasks} customers={customers} teamById={teamById}
            onAdd={() => setModal({ type: "program", mode: "add" })}
            onEdit={(p) => setModal({ type: "program", mode: "edit", data: p })}
            onDelete={deleteProgram}
            onToggleMilestone={toggleMilestone}
          />
        )}
        {view === "customers" && (
          <CustomersView
            customers={customers} programs={programs} programById={programById}
            onAdd={() => setModal({ type: "customer", mode: "add" })}
            onEdit={(c) => setModal({ type: "customer", mode: "edit", data: c })}
            onDelete={deleteCustomer}
            onSave={saveCustomer}
          />
        )}
        {view === "calendar" && (
          <CalendarView tasks={tasks} customers={customers} programs={programs} teamById={teamById} />
        )}
        {view === "gantt" && (
          <GanttView tasks={tasks} programs={programs} teamById={teamById} />
        )}
        {view === "team" && (
          <TeamView
            team={team} tasks={tasks}
            onAdd={() => setModal({ type: "team", mode: "add" })}
            onEdit={(m) => setModal({ type: "team", mode: "edit", data: m })}
            onDelete={deleteTeamMember}
          />
        )}
      </main>

      {modal?.type === "task" && (
        <TaskModal
          initial={modal.data} programs={programs} customers={customers} team={team} tasks={tasks}
          onClose={() => setModal(null)} onSave={saveTask}
        />
      )}
      {modal?.type === "program" && (
        <ProgramModal
          initial={modal.data} team={team}
          onClose={() => setModal(null)} onSave={saveProgram}
        />
      )}
      {modal?.type === "customer" && (
        <CustomerModal
          initial={modal.data} programs={programs}
          onClose={() => setModal(null)} onSave={saveCustomer}
        />
      )}
      {modal?.type === "team" && (
        <TeamModal
          initial={modal.data}
          onClose={() => setModal(null)} onSave={saveTeamMember}
        />
      )}
      {showNamePrompt && nameLoaded && (
        <NamePromptModal
          initial={currentUser}
          onSave={saveMyName}
          onClose={currentUser ? () => setShowNamePrompt(false) : null}
        />
      )}
    </div>
  );
}

function NamePromptModal({ initial, onSave, onClose }) {
  const [name, setName] = useState(initial || "");
  return (
    <Modal title="Who's editing?" onClose={onClose || (() => {})}>
      <Field label="Your name">
        <input
          autoFocus value={name} onChange={(e) => setName(e.target.value)}
          placeholder="e.g. Jordan Lee"
          onKeyDown={(e) => { if (e.key === "Enter" && name.trim()) onSave(name); }}
        />
      </Field>
      <p className="dim-text small" style={{ marginTop: -6, marginBottom: 14 }}>
        This planner is shared with your team. Your name will show up next to changes you make, so everyone can see who last touched a task or program.
      </p>
      <div className="modal-actions">
        {onClose && <button className="btn-ghost" onClick={onClose} type="button">Cancel</button>}
        <button className="btn-primary" onClick={() => name.trim() && onSave(name)} type="button">Save name</button>
      </div>
    </Modal>
  );
}

/* ---------------------------------------------------------------
   DASHBOARD
--------------------------------------------------------------- */
function Dashboard({ tasks, programs, customers, teamById, programById, onToggleTask, onGo }) {
  const today = todayISO();
  const dueSoon = tasks
    .filter((t) => t.status !== "Done" && t.dueDate && t.dueDate <= addDays(today, 7))
    .sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  const upcomingEngagements = customers
    .filter((c) => c.nextFollowUp)
    .sort((a, b) => a.nextFollowUp.localeCompare(b.nextFollowUp))
    .slice(0, 5);
  const atRisk = programs.filter((p) => p.status === "At Risk" || p.status === "Off Track");
  const openTasks = tasks.filter((t) => t.status !== "Done").length;
  const overdueCount = tasks.filter((t) => t.status !== "Done" && isOverdue(t.dueDate)).length;

  return (
    <div>
      <PageHeader eyebrow={fmtDate(today, { weekday: "long", month: "long", day: "numeric" })} title="Dashboard" />

      <div className="stat-row">
        <StatCard label="Open tasks" value={openTasks} tone="blue" onClick={() => onGo("tasks")} />
        <StatCard label="Overdue" value={overdueCount} tone="red" onClick={() => onGo("tasks")} />
        <StatCard label="Active programs" value={programs.length} tone="accent" onClick={() => onGo("programs")} />
        <StatCard label="Customer accounts" value={customers.length} tone="green" onClick={() => onGo("customers")} />
      </div>

      <div className="dash-grid">
        <div className="panel">
          <div className="panel-head"><h3>Due this week</h3><span className="dim-text">{dueSoon.length} items</span></div>
          {dueSoon.length === 0 ? (
            <EmptyState icon={<Icon name="checkcircle" size={22} />} title="Nothing due" body="You're clear for the next 7 days." />
          ) : (
            <ul className="simple-list">
              {dueSoon.slice(0, 7).map((t) => (
                <li key={t.id} className="simple-row">
                  <button className="check-circle" onClick={() => onToggleTask(t.id)} aria-label="toggle done">
                    <Icon name="checkcircle" size={16} />
                  </button>
                  <div className="simple-main">
                    <div className="simple-title">{t.title}</div>
                    <div className="simple-sub">
                      {t.programId && programById[t.programId] ? programById[t.programId].name : "No program"}
                      {" · "}<PersonChip member={teamById[t.assigneeId]} />
                    </div>
                  </div>
                  <span className={`due-tag ${isOverdue(t.dueDate) ? "overdue" : ""}`}>{fmtDate(t.dueDate)}</span>
                </li>
              ))}
            </ul>
          )}
        </div>

        <div className="panel">
          <div className="panel-head"><h3>Upcoming customer engagements</h3></div>
          {upcomingEngagements.length === 0 ? (
            <EmptyState icon={<Icon name="users" size={22} />} title="No follow-ups scheduled" body="Add a next-touch date on a customer to see it here." />
          ) : (
            <ul className="simple-list">
              {upcomingEngagements.map((c) => (
                <li key={c.id} className="simple-row">
                  <span className="avatar-dot" style={{ background: "var(--surface-2)", color: "var(--text)" }}>
                    {c.name.charAt(0)}
                  </span>
                  <div className="simple-main">
                    <div className="simple-title">{c.name}</div>
                    <div className="simple-sub">Last touch {fmtDate(c.lastTouch)}</div>
                  </div>
                  <span className={`due-tag ${isOverdue(c.nextFollowUp) ? "overdue" : ""}`}>{fmtDate(c.nextFollowUp)}</span>
                </li>
              ))}
            </ul>
          )}
        </div>

        <div className="panel span-2">
          <div className="panel-head"><h3>Programs needing attention</h3></div>
          {atRisk.length === 0 ? (
            <EmptyState icon={<Icon name="flag" size={22} />} title="All programs on track" body="Nothing flagged as at-risk or off-track right now." />
          ) : (
            <div className="program-flag-grid">
              {atRisk.map((p) => (
                <div key={p.id} className="program-flag-card">
                  <div className="pf-top">
                    <Badge color={PROGRAM_STATUS[p.status].color} bg={PROGRAM_STATUS[p.status].bg}>{p.status}</Badge>
                    <span className="dim-text mono-num">{fmtDate(p.endDate)}</span>
                  </div>
                  <div className="pf-title">{p.name}</div>
                  <div className="pf-owner"><PersonChip member={teamById[p.owner]} /></div>
                  {p.notes && <div className="pf-notes">{p.notes}</div>}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function StatCard({ label, value, tone, onClick }) {
  return (
    <button className={`stat-card tone-${tone}`} onClick={onClick} type="button">
      <div className="stat-value">{value}</div>
      <div className="stat-label">{label}</div>
    </button>
  );
}

function PageHeader({ eyebrow, title, action }) {
  return (
    <div className="page-header">
      <div>
        {eyebrow && <div className="eyebrow">{eyebrow}</div>}
        <h1>{title}</h1>
      </div>
      {action}
    </div>
  );
}

/* ---------------------------------------------------------------
   TASKS VIEW
--------------------------------------------------------------- */
function TasksView({ tasks, programs, customers, team, teamById, programById, customerById, onAdd, onEdit, onDelete, onToggleDone }) {
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterProgram, setFilterProgram] = useState("All");
  const [sortBy, setSortBy] = useState("dueDate");

  const filtered = tasks
    .filter((t) => filterStatus === "All" || t.status === filterStatus)
    .filter((t) => filterProgram === "All" || t.programId === filterProgram)
    .sort((a, b) => {
      if (sortBy === "dueDate") return (a.dueDate || "9999").localeCompare(b.dueDate || "9999");
      if (sortBy === "priority") return ["High", "Medium", "Low"].indexOf(a.priority) - ["High", "Medium", "Low"].indexOf(b.priority);
      return a.title.localeCompare(b.title);
    });

  return (
    <div>
      <PageHeader
        title="Tasks"
        action={<button className="btn-primary" onClick={onAdd}><Icon name="plus" size={15} /> New task</button>}
      />

      <div className="filter-bar">
        <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}>
          <option>All</option>
          {Object.keys(STATUS).map((s) => <option key={s}>{s}</option>)}
        </select>
        <select value={filterProgram} onChange={(e) => setFilterProgram(e.target.value)}>
          <option value="All">All programs</option>
          {programs.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
          <option value="dueDate">Sort by due date</option>
          <option value="priority">Sort by priority</option>
          <option value="title">Sort by title</option>
        </select>
        <span className="dim-text" style={{ marginLeft: "auto" }}>{filtered.length} of {tasks.length}</span>
      </div>

      {filtered.length === 0 ? (
        <EmptyState icon={<Icon name="check" size={22} />} title="No tasks match" body="Try a different filter, or add a new task." />
      ) : (
        <div className="table">
          <div className="table-row table-head">
            <div className="col-check"></div>
            <div className="col-title">Task</div>
            <div className="col-sm">Priority</div>
            <div className="col-sm">Status</div>
            <div className="col-md">Program / Customer</div>
            <div className="col-sm">Assignee</div>
            <div className="col-sm">Due</div>
            <div className="col-actions"></div>
          </div>
          {filtered.map((t) => (
            <div className="table-row" key={t.id}>
              <div className="col-check">
                <button className="check-circle" onClick={() => onToggleDone(t.id)}>
                  <Icon name="checkcircle" size={17} color={t.status === "Done" ? "var(--green)" : "var(--text-dim)"} />
                </button>
              </div>
              <div className="col-title">
                <div className={t.status === "Done" ? "strike" : ""}>{t.title}</div>
                {t.notes && <div className="dim-text small">{t.notes}</div>}
                {t.editedBy && <div className="edit-tag">Edited by {t.editedBy} · {timeAgo(t.editedAt)}</div>}
              </div>
              <div className="col-sm"><span className="dot-label"><span className="dot" style={{ background: PRIORITY[t.priority] }} />{t.priority}</span></div>
              <div className="col-sm"><Badge color={STATUS[t.status].color} bg={STATUS[t.status].bg}>{t.status}</Badge></div>
              <div className="col-md">
                {t.programId && programById[t.programId] && <div className="link-tag"><Icon name="link" size={12} />{programById[t.programId].name}</div>}
                {t.customerId && customerById[t.customerId] && <div className="link-tag"><Icon name="building" size={12} />{customerById[t.customerId].name}</div>}
                {!t.programId && !t.customerId && <span className="dim-text">—</span>}
              </div>
              <div className="col-sm"><PersonChip member={teamById[t.assigneeId]} /></div>
              <div className="col-sm">
                <span className={`due-tag ${t.status !== "Done" && isOverdue(t.dueDate) ? "overdue" : ""}`}>{fmtDate(t.dueDate)}</span>
              </div>
              <div className="col-actions">
                <IconBtn onClick={() => onEdit(t)} title="Edit"><Icon name="pencil" size={14} /></IconBtn>
                <IconBtn onClick={() => onDelete(t.id)} title="Delete" danger><Icon name="trash" size={14} /></IconBtn>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TaskModal({ initial, programs, customers, team, tasks, onClose, onSave }) {
  const [form, setForm] = useState(initial || {
    id: uid("t"), title: "", priority: "Medium", dueDate: todayISO(), status: "Not Started",
    programId: null, customerId: null, assigneeId: null, durationDays: 1, dependsOn: [], notes: "",
  });
  const sameProgramTasks = tasks.filter((t) => t.programId === form.programId && t.id !== form.id);

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const toggleDep = (id) => setForm((f) => ({
    ...f, dependsOn: f.dependsOn.includes(id) ? f.dependsOn.filter((d) => d !== id) : [...f.dependsOn, id],
  }));

  return (
    <Modal title={initial ? "Edit task" : "New task"} onClose={onClose}>
      <Field label="Title">
        <input value={form.title} onChange={(e) => set("title", e.target.value)} placeholder="e.g. Finalize vendor training schedule" />
      </Field>
      <div className="field-grid">
        <Field label="Priority">
          <select value={form.priority} onChange={(e) => set("priority", e.target.value)}>
            {Object.keys(PRIORITY).map((p) => <option key={p}>{p}</option>)}
          </select>
        </Field>
        <Field label="Status">
          <select value={form.status} onChange={(e) => set("status", e.target.value)}>
            {Object.keys(STATUS).map((s) => <option key={s}>{s}</option>)}
          </select>
        </Field>
        <Field label="Due date">
          <input type="date" value={form.dueDate} onChange={(e) => set("dueDate", e.target.value)} />
        </Field>
        <Field label="Duration (days, for Gantt)">
          <input type="number" min={1} value={form.durationDays} onChange={(e) => set("durationDays", parseInt(e.target.value) || 1)} />
        </Field>
      </div>
      <div className="field-grid">
        <Field label="Program">
          <select value={form.programId || ""} onChange={(e) => set("programId", e.target.value || null)}>
            <option value="">None</option>
            {programs.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </Field>
        <Field label="Customer">
          <select value={form.customerId || ""} onChange={(e) => set("customerId", e.target.value || null)}>
            <option value="">None</option>
            {customers.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </Field>
        <Field label="Assignee">
          <select value={form.assigneeId || ""} onChange={(e) => set("assigneeId", e.target.value || null)}>
            <option value="">Unassigned</option>
            {team.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
        </Field>
      </div>
      {form.programId && (
        <Field label="Depends on (within same program — for critical path)">
          <div className="chip-select">
            {sameProgramTasks.length === 0 && <span className="dim-text small">No other tasks in this program yet.</span>}
            {sameProgramTasks.map((t) => (
              <button
                type="button" key={t.id}
                className={`chip ${form.dependsOn.includes(t.id) ? "chip-active" : ""}`}
                onClick={() => toggleDep(t.id)}
              >
                {t.title}
              </button>
            ))}
          </div>
        </Field>
      )}
      <Field label="Notes">
        <textarea rows={2} value={form.notes} onChange={(e) => set("notes", e.target.value)} />
      </Field>
      <div className="modal-actions">
        <button className="btn-ghost" onClick={onClose} type="button">Cancel</button>
        <button className="btn-primary" onClick={() => form.title.trim() && onSave(form)} type="button">Save task</button>
      </div>
    </Modal>
  );
}

/* ---------------------------------------------------------------
   PROGRAMS VIEW
--------------------------------------------------------------- */
function ProgramsView({ programs, tasks, teamById, onAdd, onEdit, onDelete, onToggleMilestone }) {
  const [openId, setOpenId] = useState(programs[0]?.id || null);

  return (
    <div>
      <PageHeader title="Programs" action={<button className="btn-primary" onClick={onAdd}><Icon name="plus" size={15} /> New program</button>} />
      {programs.length === 0 ? (
        <EmptyState icon={<Icon name="folder" size={22} />} title="No programs yet" body="Add your first program to start tracking milestones." />
      ) : (
        <div className="program-list">
          {programs.map((p) => {
            const progTasks = tasks.filter((t) => t.programId === p.id);
            const doneCount = progTasks.filter((t) => t.status === "Done").length;
            const msDone = p.milestones.filter((m) => m.done).length;
            const isOpen = openId === p.id;
            return (
              <div key={p.id} className={`program-card ${isOpen ? "open" : ""}`}>
                <div className="program-card-head" onClick={() => setOpenId(isOpen ? null : p.id)}>
                  <div>
                    <div className="pc-title-row">
                      <span className="pc-title">{p.name}</span>
                      <Badge color={PROGRAM_STATUS[p.status].color} bg={PROGRAM_STATUS[p.status].bg}>{p.status}</Badge>
                    </div>
                    <div className="dim-text small">
                      <PersonChip member={teamById[p.owner]} /> · {fmtDate(p.startDate)} → {fmtDate(p.endDate)} · {progTasks.length} tasks ({doneCount} done) · {msDone}/{p.milestones.length} milestones
                    </div>
                    {p.editedBy && <div className="edit-tag">Edited by {p.editedBy} · {timeAgo(p.editedAt)}</div>}
                  </div>
                  <div className="row-actions" onClick={(e) => e.stopPropagation()}>
                    <IconBtn onClick={() => onEdit(p)} title="Edit"><Icon name="pencil" size={14} /></IconBtn>
                    <IconBtn onClick={() => onDelete(p.id)} title="Delete" danger><Icon name="trash" size={14} /></IconBtn>
                  </div>
                </div>
                {isOpen && (
                  <div className="program-card-body">
                    {p.notes && <p className="program-notes">{p.notes}</p>}
                    <div className="milestone-list">
                      {p.milestones.map((m) => (
                        <div key={m.id} className="milestone-row" onClick={() => onToggleMilestone(p.id, m.id)}>
                          <Icon name="checkcircle" size={16} color={m.done ? "var(--green)" : "var(--text-dim)"} />
                          <span className={m.done ? "strike" : ""}>{m.title}</span>
                          <span className="dim-text mono-num" style={{ marginLeft: "auto" }}>{fmtDate(m.date)}</span>
                        </div>
                      ))}
                      {p.milestones.length === 0 && <span className="dim-text small">No milestones added.</span>}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function ProgramModal({ initial, team, onClose, onSave }) {
  const [form, setForm] = useState(initial || {
    id: uid("pr"), name: "", status: "Planning", owner: team[0]?.id || null,
    startDate: todayISO(), endDate: addDays(todayISO(), 30), notes: "", milestones: [],
  });
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const addMilestone = () => set("milestones", [...form.milestones, { id: uid("ms"), title: "", date: todayISO(), done: false }]);
  const updateMilestone = (id, patch) => set("milestones", form.milestones.map((m) => m.id === id ? { ...m, ...patch } : m));
  const removeMilestone = (id) => set("milestones", form.milestones.filter((m) => m.id !== id));

  return (
    <Modal title={initial ? "Edit program" : "New program"} onClose={onClose} wide>
      <Field label="Program name">
        <input value={form.name} onChange={(e) => set("name", e.target.value)} placeholder="e.g. Regional Rollout — Southeast" />
      </Field>
      <div className="field-grid">

/* ---------------------------------------------------------------
   CALENDAR VIEW
--------------------------------------------------------------- */
function CalendarView({ tasks, customers, programs, teamById }) {
  const [cursor, setCursor] = useState(() => { const d = new Date(); d.setDate(1); return d; });
  const [selectedDay, setSelectedDay] = useState(todayISO());

  const year = cursor.getFullYear(), month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const isoFor = (d) => `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  const itemsByDay = useMemo(() => {
    const map = {};
    tasks.forEach((t) => { if (t.dueDate) (map[t.dueDate] ||= []).push({ kind: "task", label: t.title, sub: t.status }); });
    customers.forEach((c) => { if (c.nextFollowUp) (map[c.nextFollowUp] ||= []).push({ kind: "customer", label: c.name, sub: "Follow-up" }); });
    programs.forEach((p) => p.milestones.forEach((m) => { (map[m.date] ||= []).push({ kind: "milestone", label: m.title, sub: p.name }); }));
    return map;
  }, [tasks, customers, programs]);

  const selectedItems = itemsByDay[selectedDay] || [];

  return (
    <div>
      <PageHeader title="Calendar" />
      <div className="calendar-layout">
        <div className="panel">
          <div className="cal-nav">
            <IconBtn onClick={() => setCursor(new Date(year, month - 1, 1))} title="Previous"><Icon name="chevleft" size={16} /></IconBtn>
            <h3>{cursor.toLocaleDateString("en-US", { month: "long", year: "numeric" })}</h3>
            <IconBtn onClick={() => setCursor(new Date(year, month + 1, 1))} title="Next"><Icon name="chevright" size={16} /></IconBtn>
          </div>
          <div className="cal-grid cal-weekdays">
            {["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((d) => <div key={d} className="cal-weekday">{d}</div>)}
          </div>
          <div className="cal-grid">
            {cells.map((d, idx) => {
              if (d === null) return <div key={idx} className="cal-cell empty" />;
              const iso = isoFor(d);
              const items = itemsByDay[iso] || [];
              const isToday = iso === todayISO();
              const isSelected = iso === selectedDay;
              return (
                <div key={idx} className={`cal-cell ${isToday ? "today" : ""} ${isSelected ? "selected" : ""}`} onClick={() => setSelectedDay(iso)}>
                  <span className="cal-date">{d}</span>
                  <div className="cal-dots">
                    {items.slice(0, 3).map((it, i) => (
                      <span key={i} className={`cal-dot cal-dot-${it.kind}`} />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="panel">
          <div className="panel-head"><h3>{fmtDate(selectedDay, { weekday: "long", month: "long", day: "numeric" })}</h3></div>
          {selectedItems.length === 0 ? (
            <EmptyState icon={<Icon name="calendar" size={20} />} title="Nothing scheduled" body="No tasks, follow-ups, or milestones on this day." />
          ) : (
            <ul className="simple-list">
              {selectedItems.map((it, i) => (
                <li key={i} className="simple-row">
                  <span className={`cal-dot cal-dot-${it.kind}`} style={{ position: "static" }} />
                  <div className="simple-main">
                    <div className="simple-title">{it.label}</div>
                    <div className="simple-sub">{it.sub}</div>
                  </div>
                </li>
              ))}
            </ul>
          )}
          <div className="legend">
            <span><span className="cal-dot cal-dot-task" /> Task</span>
            <span><span className="cal-dot cal-dot-customer" /> Follow-up</span>
            <span><span className="cal-dot cal-dot-milestone" /> Milestone</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   GANTT VIEW
--------------------------------------------------------------- */
function GanttView({ tasks, programs, teamById }) {
  const [programId, setProgramId] = useState(programs[0]?.id || null);
  const progTasks = tasks.filter((t) => t.programId === programId);
  const { cpm, projectEnd } = useMemo(() => computeCPM(progTasks), [progTasks]);
  const dayWidth = 26;
  const chartWidth = Math.max(300, (projectEnd || 1) * dayWidth + 40);
  const program = programs.find((p) => p.id === programId);

  const orderedTasks = [...progTasks].sort((a, b) => (cpm[a.id]?.es ?? 0) - (cpm[b.id]?.es ?? 0));

  return (
    <div>
      <PageHeader title="Gantt & Critical Path" />
      <div className="filter-bar">
        <select value={programId || ""} onChange={(e) => setProgramId(e.target.value)}>
          {programs.length === 0 && <option value="">No programs</option>}
          {programs.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        {program && <span className="dim-text">Project window: {fmtDate(program.startDate)} → {fmtDate(program.startDate ? addDays(program.startDate, projectEnd) : null)} ({projectEnd} days)</span>}
        <div className="legend" style={{ marginLeft: "auto" }}>
          <span><span className="legend-swatch" style={{ background: "var(--accent)" }} /> Critical path</span>
          <span><span className="legend-swatch" style={{ background: "var(--blue)" }} /> Task</span>
          <span><span className="legend-swatch dashed" /> Float / slack</span>
        </div>
      </div>

      {progTasks.length === 0 ? (
        <EmptyState icon={<Icon name="chart" size={22} />} title="No tasks in this program" body="Add tasks with durations and dependencies to see the schedule." />
      ) : (
        <div className="panel gantt-panel">
          <div className="gantt-scroll">
            <div className="gantt-chart" style={{ width: chartWidth }}>
              {/* day scale */}
              <div className="gantt-scale">
                {Array.from({ length: projectEnd + 1 }, (_, d) => (
                  d % 2 === 0 ? <div key={d} className="gantt-scale-tick" style={{ left: d * dayWidth }}>{d}</div> : null
                ))}
              </div>
              {orderedTasks.map((t) => {
                const c = cpm[t.id];
                if (!c) return null;
                const left = c.es * dayWidth;
                const width = Math.max(dayWidth * 0.6, (c.ef - c.es) * dayWidth - 4);
                const floatWidth = c.slack > 0 ? c.slack * dayWidth : 0;
                return (
                  <div className="gantt-row" key={t.id}>
                    <div className="gantt-row-label">
                      <span className={`crit-dot ${c.critical ? "crit" : ""}`} />
                      <span className="gantt-task-title" title={t.title}>{t.title}</span>
                    </div>
                    <div className="gantt-track">
                      <div
                        className={`gantt-bar ${c.critical ? "critical" : ""}`}
                        style={{ left, width }}
                        title={`ES ${c.es} · EF ${c.ef} · Slack ${c.slack}d`}
                      >
                        <span className="gantt-bar-days">{c.ef - c.es}d</span>
                      </div>
                      {floatWidth > 0 && (
                        <div className="gantt-float" style={{ left: left + width + 4, width: floatWidth - 4 }} title={`Slack: +${c.slack}d`} />
                      )}
                    </div>
                    <div className="gantt-meta">
                      <span className="mono-num">ES {c.es}</span>
                      <span className="mono-num">LF {c.lf}</span>
                      <span className={`mono-num ${c.critical ? "crit-text" : ""}`}>{c.critical ? "critical" : `±${c.slack}d`}</span>
                      <PersonChip member={teamById[t.assigneeId]} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 9px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; }
.btn-ghost:hover { background: var(--surface-2); }
.btn-ghost.small { padding: 6px 10px; font-size: 12px; }

.icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 5px; padding: 5px; display: inline-flex; }
.icon-btn:hover { color: var(--text); background: var(--surface-2); }
.icon-btn.danger:hover { color: var(--red); border-color: var(--red); }

.dim-text { color: var(--text-dim); }
.dim-text.small { font-size: 12px; }
.small { font-size: 12px; }
.mono-num { font-family: var(--font-mono); font-size: 12.5px; }
.mono-num.big { font-size: 20px; font-weight: 600; color: var(--text); }
.overdue-text { color: var(--red); }
.strike { text-decoration: line-through; color: var(--text-dim); }
.sub-head { font-family: var(--font-display); font-size: 13px; margin: 16px 0 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }

/* Stat cards */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; text-align: left; border-left: 3px solid var(--border); }
.stat-card.tone-blue { border-left-color: var(--blue); }
.stat-card.tone-red { border-left-color: var(--red); }
.stat-card.tone-accent { border-left-color: var(--accent); }
.stat-card.tone-green { border-left-color: var(--green); }
.stat-card:hover { background: var(--surface-2); }
.stat-value { font-family: var(--font-mono); font-size: 26px; font-weight: 600; }
.stat-label { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }

.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dash-grid .span-2 { grid-column: 1 / -1; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; }
.panel-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.panel-head h3 { font-family: var(--font-display); font-size: 14.5px; font-weight: 600; margin: 0; }

.simple-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
.simple-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.simple-row:last-child { border-bottom: none; }
.simple-main { flex: 1; min-width: 0; }
.simple-title { font-size: 13px; font-weight: 500; }
.simple-sub { font-size: 11.5px; color: var(--text-dim); display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.check-circle { background: none; border: none; color: var(--text-dim); display: flex; padding: 0; }
.due-tag { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-dim); white-space: nowrap; }
.due-tag.overdue { color: var(--red); font-weight: 600; }

.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; border: 1px solid; white-space: nowrap; }

.person-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; }
.avatar-dot {
  width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #12161C; flex-shrink: 0;
}
.avatar-dot.lg { width: 38px; height: 38px; font-size: 15px; color: var(--text); }

.program-flag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
.program-flag-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 7px; padding: 12px 14px; }
.pf-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.pf-title { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
.pf-notes { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

/* Filter bar */
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-bar select { width: auto; }

/* Table */
.table { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.table-row {
  display: grid; grid-template-columns: 32px 2.2fr 0.9fr 0.9fr 1.4fr 1fr 0.8fr 70px;
  gap: 10px; align-items: center; padding: 11px 14px; border-bottom: 1px solid var(--border); background: var(--surface);
}
.table-row:last-child { border-bottom: none; }
.table-head { background: var(--surface-2); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; padding: 9px 14px; }
.table-row:not(.table-head):hover { background: var(--surface-2); }
.col-actions { display: flex; gap: 4px; justify-content: flex-end; }
.dot-label { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.link-tag { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-dim); }

/* Program list */
.program-list { display: flex; flex-direction: column; gap: 10px; }
.program-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.program-card-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; cursor: pointer; }
.pc-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.pc-title { font-family: var(--font-display); font-weight: 600; font-size: 14.5px; }
.program-card-body { padding: 0 18px 18px; border-top: 1px solid var(--border); }
.program-notes { font-size: 12.5px; color: var(--text-dim); margin: 12px 0; }
.milestone-list { display: flex; flex-direction: column; gap: 2px; margin-top: 12px; }
.milestone-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; }
.milestone-row:last-child { border-bottom: none; }
.row-actions { display: flex; gap: 4px; }

/* Customers */
.customer-layout { display: grid; grid-template-columns: 260px 1fr; gap: 16px; align-items: start; }
.customer-list-col { display: flex; flex-direction: column; gap: 6px; }
.customer-list-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; }
.customer-list-item.active { border-color: var(--accent); background: var(--accent-dim); }
.cl-title { font-weight: 500; font-size: 13px; }
.stat-mini { background: var(--surface-2); border-radius: 6px; padding: 10px 12px; }
.interaction-form { display: grid; grid-template-columns: 110px 1fr auto; gap: 8px; margin-bottom: 16px; }
.interaction-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.interaction-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; padding: 8px 10px; background: var(--surface-2); border-radius: 6px; }

/* Calendar */
.calendar-layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; align-items: start; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav h3 { font-family: var(--font-display); font-size: 15px; margin: 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-weekdays { margin-bottom: 4px; }
.cal-weekday { font-size: 10.5px; color: var(--text-dim); text-align: center; text-transform: uppercase; padding-bottom: 4px; }
.cal-cell { aspect-ratio: 1; border-radius: 6px; background: var(--surface-2); padding: 6px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; border: 1px solid transparent; }
.cal-cell.empty { background: transparent; cursor: default; }
.cal-cell:hover:not(.empty) { border-color: var(--border); }
.cal-cell.today { border-color: var(--accent); }
.cal-cell.selected { background: var(--accent-dim); }
.cal-date { font-family: var(--font-mono); font-size: 12px; }
.cal-dots { display: flex; gap: 3px; flex-wrap: wrap; margin-top: auto; }
.cal-dot { width: 6px; height: 6px; border-radius: 50%; }
.cal-dot-task { background: var(--blue); }
.cal-dot-customer { background: var(--green); }
.cal-dot-milestone { background: var(--accent); }
.legend { display: flex; gap: 14px; margin-top: 14px; font-size: 11.5px; color: var(--text-dim); flex-wrap: wrap; }
.legend span { display: inline-flex; align-items: center; gap: 5px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.legend-swatch.dashed { border: 1px dashed var(--text-dim); background: transparent; }

/* Gantt */
.gantt-panel { padding: 18px 0 18px 0; }
.gantt-scroll { overflow-x: auto; padding: 0 20px; }
.gantt-scale { position: relative; height: 18px; margin-left: 220px; }
.gantt-scale-tick { position: absolute; font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
.gantt-row { display: grid; grid-template-columns: 220px 1fr 260px; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); min-width: 700px; }
.gantt-row:last-child { border-bottom: none; }
.gantt-row-label { display: flex; align-items: center; gap: 7px; overflow: hidden; }
.gantt-task-title { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.crit-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.crit-dot.crit { background: var(--accent); }
.gantt-track { position: relative; height: 22px; background: linear-gradient(90deg, transparent 0, transparent calc(100% - 1px), var(--border) 100%); }
.gantt-bar { position: absolute; top: 0; height: 22px; border-radius: 4px; background: var(--blue); display: flex; align-items: center; padding: 0 6px; }
.gantt-bar.critical { background: var(--accent); }
.gantt-bar-days { font-family: var(--font-mono); font-size: 10px; color: #0E1218; font-weight: 700; }
.gantt-float { position: absolute; top: 8px; height: 6px; border-top: 1px dashed var(--text-dim); border-bottom: 1px dashed var(--text-dim); opacity: 0.7; }
.gantt-meta { display: flex; gap: 10px; align-items: center; font-size: 11px; white-space: nowrap; }
.crit-text { color: var(--accent); font-weight: 600; }

/* Team */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.team-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.team-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; background: var(--surface-2); border-radius: 6px; padding: 10px 4px; margin-bottom: 10px; }
.mini-task-list { list-style: none; margin: 0; padding: 0; font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 4px; }
.mini-task-list li { padding: 4px 0; border-top: 1px solid var(--border); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(8,10,14,0.65); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
.modal-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 460px; max-height: 88vh; overflow-y: auto; }
.modal-panel.wide { max-width: 620px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); }
.modal-header h3 { font-family: var(--font-display); font-size: 15px; margin: 0; }
.modal-body { padding: 18px 20px 20px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }

.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field-label { font-size: 11.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.03em; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.chip-select { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); border-radius: 20px; padding: 5px 12px; font-size: 12px; }
.chip-active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.color-swatch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; }
.color-swatch.active { border-color: var(--text); }

.milestone-editor { display: flex; flex-direction: column; gap: 8px; }
.milestone-edit-row { display: grid; grid-template-columns: 1fr 150px auto; gap: 8px; align-items: center; }

.empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 30px 10px; color: var(--text-dim); gap: 6px; }
.empty-state h4 { font-family: var(--font-display); font-size: 13.5px; color: var(--text); margin: 4px 0 0; }
.empty-state p { font-size: 12px; margin: 0; max-width: 240px; }

@media (max-width: 900px) {
  .app-shell { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; align-items: center; padding: 12px 16px; overflow-x: auto; }
  .brand { padding: 0; margin-right: 16px; }
  .nav { flex-direction: row; }
  .sidebar-footer { display: none; }
  .main { padding: 20px; }
  .dash-grid, .stat-row, .calendar-layout, .customer-layout { grid-template-columns: 1fr; }
  .table-row { grid-template-columns: 24px 1.5fr 1fr 70px; }
  .col-md, .col-sm:nth-of-type(3) { display: none; }
}
`;


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<OpsCommand />);
</script>
</body>
